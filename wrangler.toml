#:schema node_modules/@cloudflare/workers-types/experimental/index.d.ts

name = "farmacia-resta"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]
main = "worker-wrapper.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# KV namespace for storing Instagram token
[[kv_namespaces]]
binding = "INSTAGRAM_KV"
id = "3acf2413da2745c69060e51a7cc2bb93"

# Cron trigger - refresh Instagram token every 15 days
[triggers]
crons = ["0 0 1,15 * *"]

# Le variabili d'ambiente vanno configurate tramite wrangler secrets o dashboard Cloudflare
[vars]
